services:
  - type: web
    name: retailiq-sales-forecast
    runtime: python
    # Build from the root using the newly created requirements.txt
    buildCommand: pip install -r requirements.txt
    # Start the app from the specific subdirectory
    startCommand: gunicorn --chdir sales-forecast/sales_forecasting/flask_app app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SECRET_KEY
        generateValue: true
